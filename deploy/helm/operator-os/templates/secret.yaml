apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operator-os.fullname" . }}-secrets
  labels:
    {{- include "operator-os.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.encryptionKey }}
  OPERATOR_ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.jwtSecret }}
  OPERATOR_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeKey }}
  STRIPE_API_KEY: {{ .Values.secrets.stripeKey | quote }}
  {{- end }}
  {{- if .Values.secrets.stripeWebhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secrets.stripeWebhookSecret | quote }}
  {{- end }}
  {{- if .Values.secrets.pgDSN }}
  OPERATOR_PG_DSN: {{ .Values.secrets.pgDSN | quote }}
  {{- end }}
  {{- range $provider, $key := .Values.secrets.providerKeys }}
  {{ printf "OPERATOR_%s_API_KEY" ($provider | upper) }}: {{ $key | quote }}
  {{- end }}
